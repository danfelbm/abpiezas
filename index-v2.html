<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>De la Espriella — Peligro declarado · 6 piezas (v2 · ajustes)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;background:#cfc8b6;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  #root{min-height:100vh;}
</style>
<link rel="stylesheet" href="pieza-v2.css?v=1" />
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pieces-v2.jsx"></script>
<script type="text/babel">
  const LABELS = ["Enemigo","Manifestación","Paramilitarismo","Falsos positivos","Trizas de la paz","Aislamiento"];

  function App(){
    return (
      <DesignCanvas>
        <DCSection id="serie-v2" title="De la Espriella · Peligro declarado (v2)" subtitle="Ajustes: rojo estructural, foto como evidencia, rechazo arriba y cierre fijo">
          {PIEZAS_V2.map((p,i)=>(
            <DCArtboard key={p.n} id={"v2p"+p.n} label={String(p.n).padStart(2,"0")+" · "+LABELS[i]} width={1080} height={1080}>
              <PiezaV2 p={p} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
