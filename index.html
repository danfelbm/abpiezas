<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>De la Espriella — Peligro declarado · 6 piezas</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --paper:#e9e1cf;
    --paper-hi:#efe8d8;
    --ink:#16110b;
    --ink-soft:#46402f;
    --ink-faint:#8a8167;
    --red:#a81f17;
    --rule:#1c160d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#cfc8b6;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}

  /* ---------- square ---------- */
  .pieza{
    position:relative;
    width:1080px;height:1080px;
    background:var(--paper);
    color:var(--ink);
    overflow:hidden;
    isolation:isolate;
    -webkit-font-smoothing:antialiased;
  }
  /* paper grain + warmth */
  .pieza::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,250,235,.55), transparent 60%),
      radial-gradient(140% 120% at 110% 120%, rgba(60,48,20,.10), transparent 55%);
  }
  .pieza::after{
    content:"";position:absolute;inset:0;z-index:6;pointer-events:none;
    background-image:url("noise.svg");
    background-size:300px 300px;
    opacity:.06;mix-blend-mode:multiply;
  }

  .band{
    position:relative;z-index:1;
    width:100%;height:486px;
    overflow:hidden;
    background:var(--paper);
  }
  .band .half{
    width:100%;height:100%;
    object-fit:cover;object-position:50% 38%;
    display:block;
    filter:contrast(1.02);
  }
  .cut{
    position:relative;z-index:2;
    height:3px;background:var(--rule);
    box-shadow:0 4px 0 -2px rgba(20,15,8,.18);
  }

  .lower{
    position:relative;z-index:3;
    height:591px;
    padding:30px 60px 40px;
    display:flex;flex-direction:column;
  }

  /* meta row */
  .meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:16px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    padding-bottom:13px;border-bottom:1.5px solid var(--rule);
  }
  .brand{display:flex;align-items:center;gap:0;color:var(--ink);}
  .brand .dot{
    width:11px;height:11px;background:var(--red);border-radius:50%;
    margin-right:13px;flex:none;
  }
  .brand .sep{margin:0 10px;color:var(--ink-faint);font-weight:400;}
  .brand .declared{color:var(--red);}
  .exp{color:var(--ink-soft);letter-spacing:.18em;font-variant-numeric:tabular-nums;}

  /* kicker */
  .kicker{
    margin-top:16px;
    font-size:15px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:600;
  }
  .kicker .ksep{margin:0 9px;}
  .kicker b{color:var(--ink);font-weight:800;}

  /* hero verb — the "Obit." move */
  .hero{
    margin-top:14px;
    font-weight:800;line-height:.9;letter-spacing:-.035em;
    color:var(--ink);
    text-indent:-.02em;
  }
  .hero .per{color:var(--red);}

  /* quote */
  .quote{
    margin:22px 0 0;padding:0;
    line-height:1.34;font-weight:500;color:#241d12;
    max-width:62ch;text-wrap:pretty;
  }
  .quote .qmark{color:var(--ink-faint);font-weight:600;}
  .quote cite{
    display:block;margin-top:13px;
    font-size:14px;font-style:normal;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);
  }

  /* CTA */
  .cta{
    margin-top:auto;
    display:flex;gap:20px;align-items:stretch;
    padding-top:24px;
  }
  .cta .ctaBar{width:5px;background:var(--red);flex:none;}
  .cta p{
    margin:0;font-size:23px;line-height:1.32;font-weight:600;color:var(--ink);
    text-wrap:pretty;
  }
  .cta b{font-weight:800;}
  .cta u{
    text-decoration:none;
    color:var(--red);font-weight:800;
    box-shadow:inset 0 -2px 0 0 rgba(168,31,23,.45);
  }

  /* footer */
  .foot{
    margin-top:20px;padding-top:13px;border-top:1.5px solid var(--rule);
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
    color:var(--ink-soft);
  }
  .foot .slogan i{color:var(--red);font-style:normal;margin:0 9px;font-weight:900;}
  .foot .year{letter-spacing:.2em;color:var(--ink-faint);}

  /* canvas chrome */
  #root{min-height:100vh;}
</style>
<link rel="stylesheet" href="pieza.css?v=6" />
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pieces.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  const LABELS = ["Enemigo","Manifestación","Paramilitarismo","Falsos positivos","Trizas de la paz","Aislamiento"];

  function App(){
    return (
      <DesignCanvas>
        <DCSection id="serie" title="De la Espriella · Peligro declarado" subtitle="Seis piezas 1:1 — sus palabras, su programa, nuestro riesgo">
          {PIEZAS.map((p,i)=>(
            <DCArtboard key={p.n} id={"p"+p.n} label={String(p.n).padStart(2,"0")+" · "+LABELS[i]} width={1080} height={1080}>
              <Pieza p={p} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
