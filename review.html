<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Contact sheet</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="pieza.css?v=6" />
<style>
  body{margin:0;background:#cfc8b6;padding:22px;display:flex;flex-wrap:wrap;gap:22px;justify-content:center;}
  .holder{width:372px;height:372px;overflow:hidden;flex:none;box-shadow:0 10px 30px rgba(0,0,0,.18);}
  .holder .pieza{transform:scale(0.34444);transform-origin:top left;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="pieces.jsx"></script>
<script type="text/babel">
  function Board(){
    return PIEZAS.map(p=>(<div className="holder" key={p.n}><Pieza p={p}/></div>));
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Board/>);
</script>
</body>
</html>
